name: unvault
description: "UnVault - Secure Ethereum HD Wallet"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.0

dependencies:
  drift: ^2.22.0
  drift_flutter: ^0.2.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.0.0
  flutter_rust_bridge: ^2.7.0
  flutter_secure_storage: ^9.2.0
