dev_dependencies:
  build_runner: ^2.4.0
  custom_lint: ^0.8.1
  drift_dev: ^2.22.0
  flutter_test:
    sdk: flutter
  freezed: ^3.0.0
  json_serializable: ^6.9.0
  mocktail: ^1.0.0
